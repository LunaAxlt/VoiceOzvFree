<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бухгалтерия Pro — Система управления</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Окно входа */
        #login-screen {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Основной интерфейс */
        #main-ui {
            display: none;
            width: 90%;
            max-width: 1000px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--light);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo {
            cursor: pointer;
            font-weight: bold;
            font-size: 24px;
            color: var(--primary);
            user-select: none;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--light);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            margin-right: 2px;
            transition: 0.3s;
        }

        .btn-pay { background: var(--success); color: white; }
        .btn-bonus { background: var(--accent); color: white; }
        .btn-fine { background: #f39c12; color: white; }
        .btn-fire { background: var(--danger); color: white; }

        /* Логи */
        #logs-section {
            display: none;
            margin-top: 20px;
            background: #222;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 5px;
        }

        .hire-form {
            margin-top: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>Доступ ограничен</h2>
        <input type="password" id="pass-input" placeholder="Введите пароль">
        <br><br>
        <button onclick="login()" style="background: var(--primary); color: white; padding: 10px 20px;">Войти</button>
    </div>

    <div id="main-ui">
        <header>
            <div class="logo" onclick="toggleLogs()" title="Нажмите для просмотра логов">💼 Бухгалтерия.РФ</div>
            <div>Статус: <strong>Администратор</strong></div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">Баланс фирмы: <br><strong id="total-balance">1,000,000</strong> ₽</div>
            <div class="stat-card">Штат: <br><strong id="emp-count">0</strong> чел.</div>
            <div class="stat-card">Выплачено сегодня: <br><strong id="total-spent">0</strong> ₽</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ФИО</th>
                    <th>Должность</th>
                    <th>Зарплата</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="employee-list">
                </tbody>
        </table>

        <div class="hire-form">
            <h3>Нанять сотрудника</h3>
            <input type="text" id="new-name" placeholder="Имя Фамилия">
            <input type="text" id="new-pos" placeholder="Должность">
            <input type="number" id="new-sal" placeholder="Оклад">
            <button onclick="hire()" class="btn-pay">Добавить в штат</button>
        </div>

        <div id="logs-section">
            <strong>-- СИСТЕМНЫЕ ЛОГИ --</strong><br>
            <div id="logs-content"></div>
        </div>
    </div>

    <script>
        let balance = 1000000;
        let spent = 0;
        let employees = [
            { id: 1, name: "Иван Иванов", pos: "Менеджер", salary: 55000 },
            { id: 2, name: "Анна Смирнова", pos: "Дизайнер", salary: 70000 }
        ];

        function login() {
            const pass = document.getElementById('pass-input').value;
            if (pass === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                render();
                addLog("Вход в систему выполнен");
            } else {
                alert("Неверный пароль!");
            }
        }

        function render() {
            const list = document.getElementById('employee-list');
            list.innerHTML = "";
            employees.forEach(emp => {
                list.innerHTML += `
                    <tr>
                        <td>${emp.name}</td>
                        <td>${emp.pos}</td>
                        <td>${emp.salary} ₽</td>
                        <td>
                            <button class="btn-pay" onclick="action(${emp.id}, 'Выплата з/п', ${emp.salary})">Зарплата</button>
                            <button class="btn-bonus" onclick="action(${emp.id}, 'Премия')">Премия</button>
                            <button class="btn-fine" onclick="action(${emp.id}, 'Штраф')">Штраф</button>
                            <button class="btn-fire" onclick="fire(${emp.id})">Уволить</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('total-balance').innerText = balance.toLocaleString();
            document.getElementById('total-spent').innerText = spent.toLocaleString();
            document.getElementById('emp-count').innerText = employees.length;
        }

        function action(id, type, amount = 0) {
            const emp = employees.find(e => e.id === id);
            let val = amount || prompt(`Введите сумму для операции: ${type}`);
            if (!val || isNaN(val)) return;

            let reason = prompt("Укажите причину:");
            if (!reason) reason = "Не указана";

            val = parseInt(val);
            
            if (type === 'Штраф') {
                balance += val;
                addLog(`[${type}] ${emp.name}: +${val} ₽. Причина: ${reason}`);
            } else {
                balance -= val;
                spent += val;
                addLog(`[${type}] ${emp.name}: -${val} ₽. Причина: ${reason}`);
            }
            
            render();
        }

        function hire() {
            const name = document.getElementById('new-name').value;
            const pos = document.getElementById('new-pos').value;
            const sal = document.getElementById('new-sal').value;

            if (name && pos && sal) {
                employees.push({ id: Date.now(), name, pos, salary: parseInt(sal) });
                addLog(`[НАЙМ] Новый сотрудник: ${name} (${pos})`);
                render();
                document.getElementById('new-name').value = "";
                document.getElementById('new-pos').value = "";
                document.getElementById('new-sal').value = "";
            }
        }

        function fire(id) {
            const emp = employees.find(e => e.id === id);
            let reason = prompt(`Причина увольнения ${emp.name}:`);
            if (reason) {
                addLog(`[УВОЛЬНЕНИЕ] ${emp.name} покинул компанию. Причина: ${reason}`);
                employees = employees.filter(e => e.id !== id);
                render();
            }
        }

        function addLog(msg) {
            const content = document.getElementById('logs-content');
            const time = new Date().toLocaleTimeString();
            content.innerHTML = `> [${time}] ${msg}<br>` + content.innerHTML;
        }

        function toggleLogs() {
            const logs = document.getElementById('logs-section');
            logs.style.display = logs.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
