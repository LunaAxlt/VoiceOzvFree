<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voice Studio | Василиса AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: #0c0c0e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-bar {
            padding: 12px 20px 6px;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #8e8e93;
        }

        .header {
            padding: 20px 24px 12px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #a88bff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #8e8e93;
            font-size: 0.85rem;
            margin-top: 6px;
        }

        .avatar-section {
            display: flex;
            justify-content: center;
            margin: 16px 0 8px;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(145deg, #2a1e4a, #1a0f3a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #a88bff;
        }

        .avatar-circle span {
            font-size: 3.5rem;
        }

        .voice-name {
            text-align: center;
            margin-top: 12px;
        }

        .voice-name h2 {
            color: white;
            font-size: 1.5rem;
        }

        .voice-name p {
            color: #a88bff;
            font-size: 0.7rem;
        }

        .content {
            flex: 1;
            padding: 20px 24px;
        }

        .input-card {
            background: #1c1c1e;
            border-radius: 28px;
            padding: 4px;
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            padding: 18px 20px;
            font-size: 1rem;
            color: white;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .settings-card {
            background: #1c1c1e;
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .setting-item {
            margin-bottom: 20px;
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            color: #aeaeb2;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: #2c2c2e;
            border-radius: 4px;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 20px;
            height: 20px;
            background: #a88bff;
            border-radius: 50%;
            cursor: pointer;
            -webkit-appearance: none;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-primary {
            flex: 2;
            background: #a88bff;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }

        .btn-secondary {
            flex: 1;
            background: #2c2c2e;
            border: none;
            padding: 16px 16px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .site-block {
            background: #1c1c1e;
            border-radius: 24px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .site-block span {
            color: #aeaeb2;
            font-size: 0.85rem;
        }

        .site-link {
            background: #2c2c2e;
            padding: 8px 18px;
            border-radius: 40px;
            color: #a88bff;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .status {
            background: #1c1c1e;
            border-radius: 24px;
            padding: 12px 16px;
            font-size: 0.75rem;
            color: #8e8e93;
            text-align: center;
        }

        .footer {
            padding: 20px 24px;
            text-align: center;
            border-top: 1px solid #1c1c1e;
            margin-top: auto;
        }

        .footer p {
            color: #5e5e66;
            font-size: 0.7rem;
        }

        .footer a {
            color: #a88bff;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="status-bar">
        <span>Voice Studio</span>
        <span>🎙️</span>
    </div>

    <div class="header">
        <h1>Василиса</h1>
        <p>бесплатный сайт для озвучки</p>
    </div>

    <div class="avatar-section">
        <div class="avatar-circle">
            <span>🎙️</span>
        </div>
    </div>
    <div class="voice-name">
        <h2>Василиса</h2>
        <p>AI голос</p>
    </div>

    <div class="content">
        <div class="input-card">
            <textarea id="textInput" rows="3" placeholder="Введите текст для озвучки...">Привет! Это тестовая озвучка. Текст можно изменить.</textarea>
        </div>

        <div class="settings-card">
            <div class="setting-item">
                <div class="setting-label">
                    <span>⚡ Скорость</span>
                    <span id="rateValue">1.0</span>
                </div>
                <input type="range" id="rateSlider" min="0.5" max="1.5" step="0.05" value="1.0">
            </div>
            <div class="setting-item">
                <div class="setting-label">
                    <span>🎵 Высота</span>
                    <span id="pitchValue">1.0</span>
                </div>
                <input type="range" id="pitchSlider" min="0.5" max="1.5" step="0.05" value="1.0">
            </div>
        </div>

        <div class="buttons">
            <button class="btn-primary" id="speakBtn">🎙️ Озвучить</button>
            <button class="btn-secondary" id="previewBtn">🔊 Пример</button>
            <button class="btn-secondary" id="stopBtn">⏹️ Стоп</button>
        </div>

        <div class="site-block">
            <span>🌙 LunaAxlt Studio Games</span>
            <a href="https://LunaAxlt.github.io/StudiosGames/" class="site-link" target="_blank">Сайт →</a>
        </div>

        <div id="statusMsg" class="status">
            💜 Нажми "Озвучить"
        </div>
    </div>

    <div class="footer">
        <p>разработано <a href="https://LunaAxlt.github.io/StudiosGames/" target="_blank">LunaAxlt Studio Games</a></p>
    </div>
</div>

<script>
    // ============================================================
    // ТЕХНИЧЕСКИЙ ПЕРЕРЫВ — МЕНЯЙ ТОЛЬКО ЗДЕСЬ
    // 0 = голос работает | 1 = голос отключен
    // ============================================================
    let TECH_BREAK_ACTIVE = 0;
    
    // ============================================================
    // ГОЛОС ВАСИЛИСА — ПРОСТАЯ РАБОЧАЯ ВЕРСИЯ
    // ============================================================
    
    const textInput = document.getElementById('textInput');
    const rateSlider = document.getElementById('rateSlider');
    const pitchSlider = document.getElementById('pitchSlider');
    const rateValue = document.getElementById('rateValue');
    const pitchValue = document.getElementById('pitchValue');
    const speakBtn = document.getElementById('speakBtn');
    const previewBtn = document.getElementById('previewBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('statusMsg');
    
    let currentUtterance = null;
    
    // Обновление значений
    rateSlider.addEventListener('input', () => {
        rateValue.textContent = parseFloat(rateSlider.value).toFixed(2);
    });
    pitchSlider.addEventListener('input', () => {
        pitchValue.textContent = parseFloat(pitchSlider.value).toFixed(2);
    });
    
    // Функция озвучки
    function speakText(text) {
        // Технический перерыв
        if (TECH_BREAK_ACTIVE === 1) {
            statusDiv.innerHTML = '🔧 Технический перерыв';
            return;
        }
        
        const targetText = text || textInput.value.trim();
        
        if (!targetText) {
            statusDiv.innerHTML = '✏️ Введите текст';
            return;
        }
        
        const rate = parseFloat(rateSlider.value);
        const pitch = parseFloat(pitchSlider.value);
        
        // Останавливаем предыдущее
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(targetText);
        utterance.rate = rate;
        utterance.pitch = pitch;
        
        utterance.onstart = () => {
            statusDiv.innerHTML = `🎙️ Говорит...`;
        };
        
        utterance.onend = () => {
            statusDiv.innerHTML = `✅ Готово`;
            currentUtterance = null;
        };
        
        utterance.onerror = () => {
            statusDiv.innerHTML = `❌ Ошибка`;
            currentUtterance = null;
        };
        
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
    }
    
    function speakMain() { speakText(); }
    function speakExample() { speakText("Привет! Это бесплатный сайт для озвучки текста голосом."); }
    function stopSpeaking() { window.speechSynthesis.cancel(); currentUtterance = null; statusDiv.innerHTML = '⏹️ Остановлено'; }
    
    speakBtn.addEventListener('click', speakMain);
    previewBtn.addEventListener('click', speakExample);
    stopBtn.addEventListener('click', stopSpeaking);
    
    // Проверка поддержки
    if (!window.speechSynthesis) {
        statusDiv.innerHTML = '❌ Браузер не поддерживает голос';
    }
</script>
</body>
</html>
